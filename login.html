<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eudald Capital — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0c0c0c;
      color: #e8e0d0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 24px;
    }
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
    }
    .logo-ec {
      width: 52px; height: 52px;
      background: #c9a84c;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700; color: #080808;
      margin-bottom: 14px;
    }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px; color: #e8e0d0; letter-spacing: 1px;
    }
    .logo-sub {
      font-size: 10px; color: #3a3a3a;
      letter-spacing: 3px; text-transform: uppercase; margin-top: 4px;
    }
    .card {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      padding: 28px;
    }
    .card-title {
      font-size: 13px; color: #5a5a5a;
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 20px;
    }
    .form-row { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 9px; letter-spacing: 2px; color: #3a3a3a;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .form-input {
      width: 100%; background: #111;
      border: 1px solid #222; color: #e8e0d0;
      padding: 10px 12px; font-size: 13px;
      border-radius: 2px; font-family: 'DM Sans', sans-serif;
    }
    .form-input:focus { outline: none; border-color: #c9a84c; }
    .form-input::placeholder { color: #3a3a3a; }
    .btn-login {
      width: 100%; background: #c9a84c; color: #080808;
      border: none; padding: 11px;
      font-size: 11px; font-weight: 600; letter-spacing: 2px;
      text-transform: uppercase; border-radius: 2px;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      margin-top: 6px; transition: background 0.2s;
    }
    .btn-login:hover { background: #b8963e; }
    .btn-login:disabled { background: #2a2a2a; color: #5a5a5a; cursor: not-allowed; }
    .error-msg {
      background: #200a0a; border: 1px solid #3a1010;
      color: #c0392b; padding: 10px 12px;
      font-size: 11px; border-radius: 2px;
      margin-top: 12px; display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <div class="logo-ec">EC</div>
      <div class="logo-name">Eudald Capital</div>
      <div class="logo-sub">Advisory Dashboard</div>
    </div>
    <div class="card">
      <div class="card-title">Acceso privado</div>
      <div class="form-row">
        <label class="form-label">Email</label>
        <input class="form-input" id="email" type="email" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="form-row">
        <label class="form-label">Contraseña</label>
        <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btn-login">Entrar</button>
      <div class="error-msg" id="error-msg">Email o contraseña incorrectos.</div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase.js'

    // Si ya hay sesión activa, redirige al dashboard
    const { data: { session } } = await supabase.auth.getSession()
    if (session) window.location.href = './index.html'

    const btn = document.getElementById('btn-login')
    const errorMsg = document.getElementById('error-msg')

    // Login al pulsar Enter
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click()
    })

    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value

      if (!email || !password) {
        errorMsg.textContent = 'Introduce email y contraseña.'
        errorMsg.classList.add('show')
        return
      }

      btn.disabled = true
      btn.textContent = 'Entrando...'
      errorMsg.classList.remove('show')

      const { error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        errorMsg.textContent = 'Email o contraseña incorrectos.'
        errorMsg.classList.add('show')
        btn.disabled = false
        btn.textContent = 'Entrar'
      } else {
        window.location.href = './index.html'
      }
    })
  </script>
</body>
</html>
